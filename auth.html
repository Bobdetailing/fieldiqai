<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fieldiq AI | Get Started</title>
  <link rel="icon" type="image/png" href="fieldiqbrowser.png?v=2" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-shell-page">
  <main class="auth-shell">
    <section class="auth-shell-card">
      <a href="home.html" class="auth-logo-link" aria-label="Fieldiq AI Home">
        <img src="fieldiq-sun.png" alt="Fieldiq AI logo" class="auth-logo" />
      </a>

      <div class="auth-shell-badge">Built for owners, not accountants</div>

      <h1>Welcome to Fieldiq AI</h1>
      <p class="auth-shell-subtext">
        Choose how you want to continue.
      </p>

      <div class="auth-choice-grid">
        <a href="signup.html" class="auth-choice-card primary-choice">
          <div class="auth-choice-emoji">🚀</div>
          <h2>Create account</h2>
          <p>Start tracking profit, expenses, and business insights.</p>
          <span>Start Free</span>
        </a>

        <a href="login.html" class="auth-choice-card">
          <div class="auth-choice-emoji">🔐</div>
          <h2>Log in</h2>
          <p>Jump back into your dashboard and keep things moving.</p>
          <span>Continue</span>
        </a>
      </div>

      <div class="auth-shell-footer">
        <a href="home.html">← Back to homepage</a>
      </div>
    </section>
  </main>
</body>
</html>
