<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fieldiq AI | Payment Success</title>
  <link rel="icon" type="image/png" href="fieldiqbrowser.png?v=2" />
  <link rel="stylesheet" href="paywall.css" />
</head>
<body>
  <main class="paywall-page">
    <section class="paywall-shell success-shell">
      <div class="paywall-badge">Success</div>

      <h1 class="success-title">You’re about to enter your tailored business dashboard</h1>

      <p class="paywall-subtext success-subtext" id="success-text">
        We’re finishing your setup so you can use Fieldiq’s tools to run your business finances smarter and push things to the moon.
      </p>

      <div class="success-points">
        <div class="success-point">
          <span class="success-check">✓</span>
          <span>Your plan is active</span>
        </div>
        <div class="success-point">
          <span class="success-check">✓</span>
          <span>Your dashboard is being unlocked</span>
        </div>
        <div class="success-point">
          <span class="success-check">✓</span>
          <span>Your tools are ready to help you move smarter</span>
        </div>
      </div>

      <div id="success-message" class="paywall-message" aria-live="polite"></div>

      <div class="success-button-wrap">
        <button id="dashboard-btn" class="plan-btn plan-btn-primary success-btn" disabled>
          Enter Dashboard
        </button>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://szyakeozorhmardkdfav.supabase.co",
      "sb_publishable_WqRLpDuFC8YBkdtOuzGtSg_16n08qa-"
    );

    const successText = document.getElementById("success-text");
    const successMessage = document.getElementById("success-message");
    const dashboardBtn = document.getElementById("dashboard-btn");

    function showMessage(message, type = "error") {
      successMessage.textContent = message;
      successMessage.className = `paywall-message show ${type}`;
    }

    async function finalizeSubscription() {
      const {
        data: { user },
        error: userError,
      } = await supabase.auth.getUser();

      if (userError || !user) {
        showMessage("You need to be logged in to finish setup.");
        successText.textContent = "We couldn't verify your account yet.";
        return;
      }

      const { data: company, error: companyError } = await supabase
        .from("companies")
        .select("id")
        .eq("owner_user_id", user.id)
        .single();

      if (companyError || !company) {
        console.error(companyError);
        showMessage("We couldn't find your company record.");
        successText.textContent = "Your payment worked, but your setup still needs one more step.";
        return;
      }

      const { error: updateError } = await supabase
        .from("companies")
        .update({
          subscription_status: "active"
        })
        .eq("id", company.id);

      if (updateError) {
        console.error(updateError);
        showMessage("Payment succeeded, but access was not updated yet.");
        successText.textContent = "Please try again in a moment.";
        return;
      }

      successText.textContent =
        "Your setup is complete. Your dashboard is unlocked and ready to help you run your business with more clarity.";
      showMessage("Access unlocked successfully.", "success");
      dashboardBtn.disabled = false;
    }

    dashboardBtn.addEventListener("click", () => {
      window.location.href = "dashboard.html";
    });

    finalizeSubscription();
  </script>

  <style>
    .success-shell {
      max-width: 760px;
      text-align: center;
      padding-top: 52px;
      padding-bottom: 52px;
    }

    .success-title {
      font-size: clamp(2.2rem, 4vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: -0.045em;
      margin-top: 14px;
    }

    .success-subtext {
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
    }

    .success-points {
      max-width: 560px;
      margin: 26px auto 0;
      display: grid;
      gap: 12px;
      text-align: left;
    }

    .success-point {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      border: 1px solid #e3e9e3;
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 8px 18px rgba(16, 24, 40, 0.04);
      color: #344054;
      font-weight: 600;
    }

    .success-check {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e8f4dd;
      color: #35550f;
      font-weight: 800;
      flex-shrink: 0;
    }

    .success-button-wrap {
      margin-top: 26px;
      display: flex;
      justify-content: center;
    }

    .success-btn {
      max-width: 280px;
    }

    @media (max-width: 640px) {
      .success-shell {
        padding-top: 36px;
        padding-bottom: 36px;
      }

      .success-title {
        font-size: 2rem;
      }

      .success-point {
        padding: 13px 14px;
      }
    }
  </style>
</body>
</html>
