<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fieldiq AI | Reset Password</title>
  <link rel="icon" type="image/png" href="fieldiqbrowser.png?v=2" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="login-simple-page">
  <main class="login-simple-wrap">
    <section class="login-simple-card">
      <a href="index.html" class="auth-logo-link" aria-label="Fieldiq AI Home">
        <img src="fieldiq-sun.png" alt="Fieldiq AI logo" class="auth-logo small-auth-logo" />
      </a>

      <!-- ── Request reset ─────────────────────────────────────────────── -->
      <div id="request-section">
        <div class="auth-form-topline">Reset Password</div>
        <h1 class="login-title">Forgot your password?</h1>
        <p class="login-subtext">
          Enter your email and we'll send you a link to reset your password.
        </p>

        <div id="request-message" class="auth-message" aria-live="polite"></div>

        <form id="request-form" class="auth-form">
          <label for="reset-email">Email</label>
          <input
            type="email"
            id="reset-email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <button type="submit" id="request-btn" class="auth-submit-btn">
            Send Reset Link
          </button>
        </form>

        <p class="auth-back-link">
          <a href="login.html">← Back to login</a>
        </p>
      </div>

      <!-- ── New password form (shown after clicking email link) ──────── -->
      <div id="confirm-section" style="display:none;">
        <div class="auth-form-topline">New Password</div>
        <h1 class="login-title">Set a new password</h1>
        <p class="login-subtext">
          Enter your new password below.
        </p>

        <div id="confirm-message" class="auth-message" aria-live="polite"></div>

        <form id="confirm-form" class="auth-form">
          <label for="new-password">New Password</label>
          <input
            type="password"
            id="new-password"
            placeholder="Enter new password"
            autocomplete="new-password"
            required
          />
          <button type="submit" id="confirm-btn" class="auth-submit-btn">
            Update Password
          </button>
        </form>
      </div>

    </section>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

    const supabase = createClient(
      "https://szyakeozorhmardkdfav.supabase.co",
      "sb_publishable_WqRLpDuFC8YBkdtOuzGtSg_16n08qa-"
    )

    function showMsg(id, text, type = "error") {
      const el = document.getElementById(id)
      if (!el) return
      el.textContent = text
      el.className = `auth-message show ${type}`
    }

    // Check if we're on the confirm step (came from email link)
    const hash = window.location.hash
    if (hash && hash.includes("type=recovery")) {
      document.getElementById("request-section").style.display = "none"
      document.getElementById("confirm-section").style.display = "block"
    }

    // Request reset
    document.getElementById("request-form").addEventListener("submit", async (e) => {
      e.preventDefault()
      const email = document.getElementById("reset-email").value.trim()
      if (!email) return

      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: "https://fieldiqai.com/reset-password.html"
      })

      if (error) {
        showMsg("request-message", error.message)
      } else {
        showMsg("request-message", "Check your email for the reset link!", "success")
      }
    })

    // Confirm new password
    document.getElementById("confirm-form").addEventListener("submit", async (e) => {
      e.preventDefault()
      const password = document.getElementById("new-password").value

      const { error } = await supabase.auth.updateUser({ password })

      if (error) {
        showMsg("confirm-message", error.message)
      } else {
        showMsg("confirm-message", "Password updated! Redirecting...", "success")
        setTimeout(() => window.location.href = "login.html", 1500)
      }
    })
  </script>
</body>
</html>
